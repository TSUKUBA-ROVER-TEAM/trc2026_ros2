navsat_transform:
  ros__parameters:
    frequency: 30.0
    delay: 3.0
    magnetic_declination_radians: 0.13 # つくば付近の磁気偏角 (rad)
    yaw_offset: 0.0 # ENU出力(基準が東)の場合は0.0
    zero_altitude: true
    broadcast_cartesian_transform: false
    publish_filtered_gps: true
    use_odometry_yaw: false
    wait_for_datum: true
    datum: [36.111111, 140.099593, 0.0] # 必要に応じて調整
