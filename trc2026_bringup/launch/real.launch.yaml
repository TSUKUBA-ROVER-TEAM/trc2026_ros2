
launch:
  - node:
      pkg: foxglove_bridge
      exec: foxglove_bridge
      name: foxglove_bridge
      output: screen
      remap:
        - from: /joy
          to: /joy_foxglove
      param:
        - name: "asset_uri_allowlist"
          value: ["^package://.*$"]

  - node:
      pkg: robot_state_publisher
      exec: robot_state_publisher
      name: robot_state_publisher
      param:
        - name: robot_description
          value: $(command 'xacro $(find-pkg-share trc2026_description)/urdf/trc2026.xacro')

  - node:
      pkg: joint_state_publisher
      exec: joint_state_publisher
      name: joint_state_publisher

  - node:
      pkg: "trc2026_control"
      exec: "four_wheel_steer_controller_node"
      name: "four_wheel_steer_controller"
      output: "screen"
      remap:
        - from: "/cmd_vel"
          to: "/cmd_vel_out"
      param:
        - name: "publish_joint_states"
          value: false
        - name: "publish_odom"
          value: true
        - name: "publish_odom_tf"
          value: false
        - name: "gear_ratio_scale"
          value: 0.6981 

  - node:
      pkg: "micro_ros_agent"
      exec: "micro_ros_agent"
      name: "teensy_drive_agent"
      output: "screen"
      args: "serial --dev /dev/teensy_drive --baud 115200"

  - node:
      pkg: "micro_ros_agent"
      exec: "micro_ros_agent"
      name: "teensy_science_agent"
      output: "screen"
      args: "serial --dev /dev/teensy_science --baud 115200"

  - node:
      pkg: "trc2026_manual"
      exec: "drive_manual_controller_node"
      output: "screen"
      remap:
        - from: "/cmd_vel"
          to: "/cmd_vel_manual"
      param:
        - name: "scale_linear_x"
          value: 0.6981
        - name: "scale_linear_y"
          value: 0.6981
        - name: "scale_angular_z"
          value: 0.6981

  - node:
      pkg: "twist_mux"
      exec: "twist_mux"
      name: "twist_mux"
      output: "screen"
      param:
        - from: "$(find-pkg-share trc2026_bringup)/config/twist_mux.yaml"
      remap:
        - from: "/cmd_vel"
          to: "/cmd_vel_out"

  - node:
      pkg: "trc2026_control"
      exec: "aruco_mission_node"
      name: "aruco_mission_node"
      output: "screen"
      remap:
        - from: "/cmd_vel"
          to: "/cmd_vel_aruco"
        - from: "aruco_detections"
          to: "/aruco_detections"
        - from: "start"
          to: "/aruco_mission/start"
      param:
        - name: "target_marker_count"
          value: 20
        - name: "target_marker_ids"
          value: [345, 78, 912, 456, 123, 689, 27, 541, 804, 399, 250, 967, 618, 72, 731, 158, 884, 436, 205, 790]
        - name: "target_lost_cycles"
          value: 20
          
        - name: "approach_distance"
          value: 2.0
        - name: "search_turn_count"
          value: 2.0
        - name: "search_recovery_speed"
          value: 0.6
        - name: "search_recovery_duration"
          value: 3.0
        - name: "auto_start"
          value: true
        - name: "linear_speed"
          value: 0.6
        - name: "angular_speed"
          value: 0.8
        - name: "turning_duration_sec"
          value: 3.0
        - name: "orbiting_duration_sec"
          value: 25.0
        - name: "target_azimuth_topic"
          value: "/control_history/target_azimuth"

  - node:
      pkg: "trc2026_control"
      exec: "control_history_csv_logger_node"
      name: "control_history_csv_logger"
      output: "screen"
      param:
        - name: "output_csv"
          value: "trc2026_control_history.csv"
        - name: "append"
          value: true
        - name: "write_interval_sec"
          value: 1.0
        - name: "include_target_columns"
          value: true
        - name: "include_azimuth_columns"
          value: true
        - name: "include_checked_point"
          value: true
        - name: "include_action_result"
          value: true
        - name: "include_autonomy"
          value: true
        - name: "include_odom_columns"
          value: true
        - name: "include_cmd_vel_columns"
          value: true
        - name: "gps_topic"
          value: "/gps/fix"
        - name: "odom_topic"
          value: "/odom"
        - name: "cmd_vel_topic"
          value: "/cmd_vel_out"
        - name: "manual_cmd_topic"
          value: "/cmd_vel_manual"
        - name: "auto_cmd_topic"
          value: "/cmd_vel_aruco"
        - name: "start_topic"
          value: "/aruco_mission/start"
        - name: "command_topic"
          value: "/control_history/command"
        - name: "action_topic"
          value: "/control_history/action"
        - name: "result_topic"
          value: "/control_history/result"
        - name: "checked_point_topic"
          value: "/control_history/checked_point"
        - name: "target_azimuth_topic"
          value: "/control_history/target_azimuth"
        - name: "intervention_hold_sec"
          value: 1.0

  - node:
      pkg: "joy"
      exec: "joy_node"
      output: "screen"
      remap:
        - from: "joy"
          to: "joy_physical"

  - node:
      pkg: "trc2026_manual"
      exec: "joy_filter_node"
      name: "joy_filter"
      output: "screen"

  - node:
      pkg: "nmea_navsat_driver"
      exec: "nmea_serial_driver"
      name: "nmea_serial_driver"
      namespace: "gps"
      output: "screen"
      param:
        - name: "port"
          value: "/dev/gps"
        - name: "baud"
          value: 115200
        - name: "frame_id"
          value: "gps_link"
        - name: "time_ref_source"
          value: "gps"
        - name: "use_RMC"
          value: false

  - node:
      pkg: "rt_usb_9axisimu_driver"
      exec: "rt_usb_9axisimu_driver"
      name: "rt_usb_9axisimu_driver"
      param:
        - name: "port"
          value: "/dev/imu"
        - name: "frame_id"
          value: "imu_link"
      remap:
        - from: "/imu/data_raw"
          to: "/imu/data_raw_orig"

  - node:
      pkg: "trc2026_bringup"
      exec: "imu_relay_node.py"
      name: "imu_relay_node"

  - node:
      pkg: "imu_filter_madgwick"
      exec: "imu_filter_madgwick_node"
      name: "imu_filter_node"
      param:
        - name: "use_mag"
          value: true
        - name: "publish_tf"
          value: false
        - name: "world_frame"
          value: "enu"

  - node:
      pkg: "trc2026_bringup"
      exec: "mag_relay_node.py"
      name: "mag_relay_node"
      param:
        - from: "$(find-pkg-share trc2026_bringup)/config/mag_calibration.yaml"

  - node:
      pkg: "nav2_lifecycle_manager"
      exec: "lifecycle_manager"
      name: "lifecycle_manager_service"
      param:
        - name: "autostart"
          value: true
        - name: "node_names"
          value: ["rt_usb_9axisimu_driver"]

  - node:
      pkg: trc2026_driver
      exec: robstride_bridge_node
      name: robstride_bridge_node
      param:
        - from: "$(find-pkg-share trc2026_bringup)/config/arm_params.yaml"
      output: screen

  - node:
      pkg: trc2026_manual
      exec: arm_manual_controller_node
      name: arm_manual_controller_node
      param:
        - from: "$(find-pkg-share trc2026_bringup)/config/arm_params.yaml"
      output: screen

  - node:
      pkg: trc2026_driver
      exec: can_tx_node
      name: can_tx_node

  - node:
      pkg: trc2026_driver
      exec: can_rx_node
      name: can_rx_node

  # Azure Kinect Driver
  - include:
      file: "$(find-pkg-share azure_kinect_ros_driver)/launch/driver.launch.py"
      arg:
        - name: "depth_enabled"
          value: "false"
        - name: "point_cloud"
          value: "false"
        - name: "rgb_point_cloud"
          value: "false"
        - name: "color_resolution"
          value: "720P"
        - name: "fps"
          value: "30"
        - name: "color_format"
          value: "jpeg"

  - node:
      pkg: "aruco_opencv"
      exec: "aruco_tracker_autostart"
      name: "aruco_tracker"
      param:
        - name: "cam_base_topic"
          value: "/rgb/image_raw"
        - name: "image_sub_compressed"
          value: true
        - name: "marker_dict"
          value: "7X7_1000"
        - name: "image_is_rectified"
          value: true
        - name: "marker_size"
          value: 0.20
