launch:
  - node:
      pkg: foxglove_bridge
      exec: foxglove_bridge
      name: foxglove_bridge
      output: screen
      remap:
        - from: /joy
          to: /joy_foxglove
      param:
        - name: "asset_uri_allowlist"
          value: ["^package://.*$"]

  - node:
      pkg: robot_state_publisher
      exec: robot_state_publisher
      name: robot_state_publisher
      param:
        - name: robot_description
          value: $(command 'xacro $(find-pkg-share trc2026_description)/urdf/trc2026.xacro')
  
  - node:
      pkg: joint_state_publisher
      exec: joint_state_publisher
      name: joint_state_publisher

  - node:
      pkg: "trc2026_control"
      exec: "four_wheel_steer_controller_node"
      name: "four_wheel_steer_controller"
      output: "screen"

  - node:
      pkg: "micro_ros_agent"
      exec: "micro_ros_agent"
      name: "micro_ros_agent"
      output: "screen"
      args: "serial --dev /dev/teensy_drive --baud 115200"

  - node:
      pkg: "trc2026_manual"
      exec: "drive_manual_controller_node"
      output: "screen"

  - node:
      pkg: "joy"
      exec: "joy_node"
      output: "screen"
      remap:
        - from: "joy"
          to: "joy_physical"

  - node:
      pkg: "trc2026_manual"
      exec: "joy_filter_node"
      name: "joy_filter"
      output: "screen"

  - node:
      pkg: "nmea_navsat_driver"
      exec: "nmea_serial_driver"
      name: "nmea_serial_driver"
      namespace: "gps"
      output: "screen"
      param:
        - name: "port"
          value: "/dev/gps"
        - name: "baud"
          value: 9600
        - name: "frame_id"
          value: "gps_link"
        - name: "time_ref_source"
          value: "gps"
        - name: "use_RMC"
          value: false
  
  - node:
      pkg: "rt_usb_9axisimu_driver"
      exec: "rt_usb_9axisimu_driver"
      name: "rt_usb_9axisimu_driver"
      param:
        - name: "port"
          value: "/dev/imu"
        - name: "frame_id"
          value: "imu_link"

  - node:
      pkg: "imu_filter_madgwick"
      exec: "imu_filter_madgwick_node"
      name: "imu_filter_node"
      param:
        - name: "use_mag"
          value: false
        - name: "publish_tf"
          value: true
        - name: "world_frame"
          value: "map"
      remap:
        - from: "/imu/data_raw"
          to: "/imu/data_raw"
        - from: "/imu/mag"
          to: "/imu/mag"
    
  - node:
      pkg: "nav2_lifecycle_manager"
      exec: "lifecycle_manager"
      name: "lifecycle_manager_service"
      param:
        - name: "autostart"
          value: true
        - name: "node_names"
          value: ["rt_usb_9axisimu_driver"]

  - node:
      pkg: trc2026_driver
      exec: robstride_bridge_node
      name: robstride_bridge_node
      param:
        - from: "$(find-pkg-share trc2026_bringup)/config/arm_params.yaml"
      output: screen

  - node:
      pkg: trc2026_manual
      exec: arm_manual_controller_node
      name: arm_manual_controller_node
      param:
        - from: "$(find-pkg-share trc2026_bringup)/config/arm_params.yaml"
      output: screen

  - node:
      pkg: trc2026_driver
      exec: can_tx_node
      name: can_tx_node
  
  - node:
      pkg: trc2026_driver
      exec: can_rx_node
      name: can_rx_node
      
  - executable:
      cmd: 'bash $(find-pkg-share trc2026_bringup)/scripts/webrtc_auto_launch.sh'
      name: 'go2rtc_server'
      output: 'screen'