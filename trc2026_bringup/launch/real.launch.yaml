launch:
  - node:
      pkg: foxglove_bridge
      exec: foxglove_bridge
      name: foxglove_bridge
      output: screen
      remap:
        - from: /joy
          to: /joy_foxglove
      param:
        - name: "asset_uri_allowlist"
          value: ["^package://.*$"]

  - node:
      pkg: robot_state_publisher
      exec: robot_state_publisher
      name: robot_state_publisher
      param:
        - name: robot_description
          value: $(command 'xacro $(find-pkg-share trc2026_description)/urdf/trc2026.xacro')

  - node:
      pkg: joint_state_publisher
      exec: joint_state_publisher
      name: joint_state_publisher

  - node:
      pkg: "trc2026_control"
      exec: "four_wheel_steer_controller_node"
      name: "four_wheel_steer_controller"
      output: "screen"
      remap:
        - from: "/cmd_vel"
          to: "/cmd_vel_out"
      param:
        - name: "publish_joint_states"
          value: false
        - name: "publish_odom"
          value: false
        - name: "publish_odom_tf"
          value: false
        - name: "gear_ratio_scale"
          value: 0.6981 # (36.0 / 19.1) * (20.0 / 54.0) = 0.6981 (M3508 + 外部減速20:54用)

  # 自己位置推定 (Local EKF)
  - node:
      pkg: "robot_localization"
      exec: "ekf_node"
      name: "ekf_filter_node_odom"
      output: "screen"
      param:
        - from: "$(find-pkg-share trc2026_bringup)/config/localization.yaml"
      remap:
        - from: "/odometry/filtered"
          to: "/odometry/local"

  # 自己位置推定 (Global EKF)
  - node:
      pkg: "robot_localization"
      exec: "ekf_node"
      name: "ekf_filter_node_map"
      output: "screen"
      param:
        - from: "$(find-pkg-share trc2026_bringup)/config/localization.yaml"
      remap:
        - from: "/odometry/filtered"
          to: "/odometry/global"

  # GPS座標変換
  - node:
      pkg: "robot_localization"
      exec: "navsat_transform_node"
      name: "navsat_transform"
      output: "screen"
      param:
        - from: "$(find-pkg-share trc2026_bringup)/config/localization.yaml"
        - name: "datum"
          value: [&gps_origin_lat 36.111090833333336, &gps_origin_lon 140.09949666666665, 0.0] # 実座標はここを変更
      remap:
        - from: "/imu/data"
          to: "/imu/data"
        - from: "/gps/fix"
          to: "/gps/fix"
        - from: "/odometry/filtered"
          to: "/odometry/global"

  # ウェイポイント追従
  - node:
      pkg: "four_wheel_steering_nav2"
      exec: "waypoint_follower"
      name: "waypoint_follower"
      output: "screen"
      param:
        - name: "waypoints_file"
          value: ""
        - name: "use_pure_pursuit"
          value: false # 4WS制御モード
        - name: "gps_origin_lat"
          value: *gps_origin_lat
        - name: "gps_origin_lon"
          value: *gps_origin_lon
      remap:
        - from: "/odometry/filtered"
          to: "/odometry/global"
        - from: "/cmd_vel"
          to: "/cmd_vel_nav"

  # ArUcoミッションマネージャー
  - node:
      pkg: "four_wheel_steering_nav2"
      exec: "aruco_mission_manager"
      name: "aruco_mission_manager"
      output: "screen"
      param:
        - name: "csv_path"
          value: "$(find-pkg-share trc2026_bringup)/config/aruco_missions.csv"
        - name: "gps_origin_lat"
          value: *gps_origin_lat
        - name: "gps_origin_lon"
          value: *gps_origin_lon
        - name: "pass_margin"
          value: 1.0
        - name: "target_offset"
          value: 2.0
        - name: "frame_id"
          value: "map"
      remap:
        - from: "/odometry/filtered"
          to: "/odometry/global"

  # ナビゲーション可視化 (Foxglove/RViz)
  - node:
      pkg: "four_wheel_steering_nav2"
      exec: "navigation_visualizer"
      name: "navigation_visualizer"
      output: "screen"
      param:
        - name: "waypoints_file"
          value: "$(find-pkg-share four_wheel_steering_nav2)/config/waypoints.yaml"
        - name: "gps_origin_lat"
          value: *gps_origin_lat
        - name: "gps_origin_lon"
          value: *gps_origin_lon
        - name: "frame_id"
          value: "map"
        - name: "path_length"
          value: 1000
      remap:
        - from: "/odometry/filtered"
          to: "/odometry/global"

  # ナビゲーション管理 (サービス/ステータス用)
  - node:
      pkg: "four_wheel_steering_nav2"
      exec: "navigation_master"
      name: "navigation_master"
      output: "screen"
      remap:
        - from: "/odometry/filtered"
          to: "/odometry/global"

  - node:
      pkg: "micro_ros_agent"
      exec: "micro_ros_agent"
      name: "teensy_drive_agent"
      output: "screen"
      args: "serial --dev /dev/teensy_drive --baud 115200"

  - node:
      pkg: "micro_ros_agent"
      exec: "micro_ros_agent"
      name: "teensy_science_agent"
      output: "screen"
      args: "serial --dev /dev/teensy_science --baud 115200"

  - node:
      pkg: "trc2026_manual"
      exec: "drive_manual_controller_node"
      output: "screen"
      remap:
        - from: "/cmd_vel"
          to: "/cmd_vel_manual"
      param:
        - name: "scale_linear_x"
          value: 0.6981
        - name: "scale_linear_y"
          value: 0.6981
        - name: "scale_angular_z"
          value: 0.6981

  - node:
      pkg: "twist_mux"
      exec: "twist_mux"
      name: "twist_mux"
      output: "screen"
      param:
        - from: "$(find-pkg-share trc2026_bringup)/config/twist_mux.yaml"
      remap:
        - from: "/cmd_vel"
          to: "/cmd_vel_out"

  - node:
      pkg: "joy"
      exec: "joy_node"
      output: "screen"
      remap:
        - from: "joy"
          to: "joy_physical"

  - node:
      pkg: "trc2026_manual"
      exec: "joy_filter_node"
      name: "joy_filter"
      output: "screen"

  - node:
      pkg: "nmea_navsat_driver"
      exec: "nmea_serial_driver"
      name: "nmea_serial_driver"
      namespace: "gps"
      output: "screen"
      param:
        - name: "port"
          value: "/dev/gps"
        - name: "baud"
          value: 115200
        - name: "frame_id"
          value: "gps_link"
        - name: "time_ref_source"
          value: "gps"
        - name: "use_RMC"
          value: false

  - node:
      pkg: "rt_usb_9axisimu_driver"
      exec: "rt_usb_9axisimu_driver"
      name: "rt_usb_9axisimu_driver"
      param:
        - name: "port"
          value: "/dev/ttyACM0"
        - name: "frame_id"
          value: "imu_link"
      remap:
        - from: "/imu/data_raw"
          to: "/imu/data_raw_orig"

  # IMUバイアス・反転補正
  - node:
      pkg: "trc2026_bringup"
      exec: "imu_relay_node.py"
      name: "imu_relay_node"
      remap:
        - from: "/imu/data_raw_orig"
          to: "/imu/data_raw_orig"
        - from: "/imu/data_raw"
          to: "/imu/data_raw"

  - node:
      pkg: "imu_filter_madgwick"
      exec: "imu_filter_madgwick_node"
      name: "imu_filter_node"
      param:
        - name: "use_mag"
          value: true
        - name: "publish_tf"
          value: false
        - name: "world_frame"
          value: "enu"
      remap:
        - from: "/imu/data_raw"
          to: "/imu/data_raw"
        - from: "/imu/mag"
          to: "/imu/mag_calibrated"

  # 磁気補正
  - node:
      pkg: "trc2026_bringup"
      exec: "mag_relay_node.py"
      name: "mag_relay_node"
      param:
        - from: "$(find-pkg-share trc2026_bringup)/config/mag_calibration.yaml"

  - node:
      pkg: "nav2_lifecycle_manager"
      exec: "lifecycle_manager"
      name: "lifecycle_manager_service"
      param:
        - name: "autostart"
          value: true
        - name: "node_names"
          value: ["rt_usb_9axisimu_driver"]

  - node:
      pkg: trc2026_driver
      exec: robstride_bridge_node
      name: robstride_bridge_node
      param:
        - from: "$(find-pkg-share trc2026_bringup)/config/arm_params.yaml"
      output: screen

  - node:
      pkg: trc2026_manual
      exec: arm_manual_controller_node
      name: arm_manual_controller_node
      param:
        - from: "$(find-pkg-share trc2026_bringup)/config/arm_params.yaml"
      output: screen

  - node:
      pkg: trc2026_driver
      exec: can_tx_node
      name: can_tx_node

  - node:
      pkg: trc2026_driver
      exec: can_rx_node
      name: can_rx_node

  - node:
      pkg: trc2026_bringup
      exec: camera_node.py
      name: camera_fukan
      param:
        - name: device
          value: "/dev/v4l/by-id/usb-Huawei_HiCamera_12345678-video-index0"
        - name: frame_id
          value: "camera_front_link"
        - name: width
          value: 640
        - name: height
          value: 360
        - name: framerate
          value: 30
        - name: source_codec
          value: "mjpg"
        - name: lifespan_ms
          value: 100
      remap:
        - from: compressed_video
          to: /camera_fukan/compressed_video

  - node:
      pkg: "v4l2_camera"
      exec: "v4l2_camera_node"
      name: "arm_camera"
      namespace: "arm_camera"
      param:
        - name: "video_device"
          value: "/dev/v4l/by-id/usb-Jieli_Technology_USB_Composite_Device-video-index0"
        - name: "image_size"
          value: [320, 240]
        - name: "frame_id"
          value: "camera_link"
        - name: "pixel_format"
          value: "YUYV"
        - name: "qos_overrides./image_raw.publisher.reliability"
          value: "best_effort"
        - name: "qos_overrides./image_raw.publisher.depth"
          value: 1
  
  - node:
      pkg: "v4l2_camera"
      exec: "v4l2_camera_node"
      name: "science_camera"
      namespace: "science_camera"
      param:
        - name: "video_device"
          value: "/dev/v4l/by-id/usb-046d_C505e_HD_Webcam_D143AE90-video-index0"
        - name: "image_size"
          value: [352, 288]
        - name: "frame_id"
          value: "camera_link"
        - name: "pixel_format"
          value: "YUYV"
        - name: "qos_overrides./image_raw.publisher.reliability"
          value: "best_effort"
        - name: "qos_overrides./image_raw.publisher.depth"
          value: 1
