launch:
  - node:
      pkg: foxglove_bridge
      exec: foxglove_bridge
      name: foxglove_bridge
      output: screen
      remap:
        - from: /joy
          to: /joy_foxglove
      param:
        - name: "asset_uri_allowlist"
          value: ["^package://.*$"]

  - node:
      pkg: robot_state_publisher
      exec: robot_state_publisher
      name: robot_state_publisher
      param:
        - name: robot_description
          value: $(command 'xacro $(find-pkg-share trc2026_description)/urdf/trc2026.xacro')

  - node:
      pkg: joint_state_publisher
      exec: joint_state_publisher
      name: joint_state_publisher

  - node:
      pkg: "trc2026_control"
      exec: "four_wheel_steer_controller_node"
      name: "four_wheel_steer_controller"
      output: "screen"
      remap:
        - from: "/cmd_vel"
          to: "/cmd_vel_out"
      param:
        - name: "publish_joint_states"
          value: false
        - name: "publish_odom"
          value: true
        - name: "publish_odom_tf"
          value: false
        - name: "gear_ratio_scale"
          value: 0.6981 # (36.0 / 19.1) * (20.0 / 54.0) = 0.6981 (M3508 + 外部減速20:54用)

  - node:
      pkg: "micro_ros_agent"
      exec: "micro_ros_agent"
      name: "teensy_drive_agent"
      output: "screen"
      args: "serial --dev /dev/teensy_drive --baud 115200"

  - node:
      pkg: "micro_ros_agent"
      exec: "micro_ros_agent"
      name: "teensy_science_agent"
      output: "screen"
      args: "serial --dev /dev/teensy_science --baud 115200"

  - node:
      pkg: "trc2026_manual"
      exec: "drive_manual_controller_node"
      output: "screen"
      remap:
        - from: "/cmd_vel"
          to: "/cmd_vel_manual"
      param:
        - name: "scale_linear_x"
          value: 0.6981
        - name: "scale_linear_y"
          value: 0.6981
        - name: "scale_angular_z"
          value: 0.6981

  - node:
      pkg: "twist_mux"
      exec: "twist_mux"
      name: "twist_mux"
      output: "screen"
      param:
        - from: "$(find-pkg-share trc2026_bringup)/config/twist_mux.yaml"
      remap:
        - from: "/cmd_vel"
          to: "/cmd_vel_out"

  - node:
      pkg: "aruco_opencv"
      exec: "aruco_tracker_autostart"
      name: "aruco_tracker"
      output: "screen"
      param:
        - from: "$(find-pkg-share aruco_opencv)/config/aruco_tracker.yaml"
        - name: "board_descriptions_path"
          value: "$(find-pkg-share aruco_opencv)/config/board_descriptions.yaml"
        - name: "cam_base_topic"
          value: "/arm_camera/image_raw"

  - node:
      pkg: "trc2026_control"
      exec: "aruco_mission_node"
      name: "aruco_mission_node"
      output: "screen"
      remap:
        - from: "/cmd_vel"
          to: "/cmd_vel_aruco"
        - from: "aruco_detections"
          to: "/aruco_detections"
        - from: "start"
          to: "/aruco_mission/start"
      param:
        - name: "target_marker_id"
          value: 0
        - name: "approach_distance"
          value: 1.0
        - name: "search_turn_count"
          value: 2.0
        - name: "search_recovery_speed"
          value: 0.15
        - name: "search_recovery_duration"
          value: 1.0
        - name: "auto_start"
          value: false

  - node:
      pkg: "joy"
      exec: "joy_node"
      output: "screen"
      remap:
        - from: "joy"
          to: "joy_physical"

  - node:
      pkg: "trc2026_manual"
      exec: "joy_filter_node"
      name: "joy_filter"
      output: "screen"

  - node:
      pkg: "nmea_navsat_driver"
      exec: "nmea_serial_driver"
      name: "nmea_serial_driver"
      namespace: "gps"
      output: "screen"
      param:
        - name: "port"
          value: "/dev/gps"
        - name: "baud"
          value: 115200
        - name: "frame_id"
          value: "gps_link"
        - name: "time_ref_source"
          value: "gps"
        - name: "use_RMC"
          value: false

  - node:
      pkg: "rt_usb_9axisimu_driver"
      exec: "rt_usb_9axisimu_driver"
      name: "rt_usb_9axisimu_driver"
      param:
        - name: "port"
          value: "/dev/ttyACM0"
        - name: "frame_id"
          value: "imu_link"
      remap:
        - from: "/imu/data_raw"
          to: "/imu/data_raw_orig"

  # IMUバイアス・反転補正
  - node:
      pkg: "trc2026_bringup"
      exec: "imu_relay_node.py"
      name: "imu_relay_node"
      remap:
        - from: "/imu/data_raw_orig"
          to: "/imu/data_raw_orig"
        - from: "/imu/data_raw"
          to: "/imu/data_raw"

  - node:
      pkg: "imu_filter_madgwick"
      exec: "imu_filter_madgwick_node"
      name: "imu_filter_node"
      param:
        - name: "use_mag"
          value: true
        - name: "publish_tf"
          value: false
        - name: "world_frame"
          value: "enu"
      remap:
        - from: "/imu/data_raw"
          to: "/imu/data_raw"
        - from: "/imu/mag"
          to: "/imu/mag_calibrated"

  # 磁気補正
  - node:
      pkg: "trc2026_bringup"
      exec: "mag_relay_node.py"
      name: "mag_relay_node"
      param:
        - from: "$(find-pkg-share trc2026_bringup)/config/mag_calibration.yaml"

  - node:
      pkg: "nav2_lifecycle_manager"
      exec: "lifecycle_manager"
      name: "lifecycle_manager_service"
      param:
        - name: "autostart"
          value: true
        - name: "node_names"
          value: ["rt_usb_9axisimu_driver"]

  - node:
      pkg: trc2026_driver
      exec: robstride_bridge_node
      name: robstride_bridge_node
      param:
        - from: "$(find-pkg-share trc2026_bringup)/config/arm_params.yaml"
      output: screen

  - node:
      pkg: trc2026_manual
      exec: arm_manual_controller_node
      name: arm_manual_controller_node
      param:
        - from: "$(find-pkg-share trc2026_bringup)/config/arm_params.yaml"
      output: screen

  - node:
      pkg: trc2026_driver
      exec: can_tx_node
      name: can_tx_node

  - node:
      pkg: trc2026_driver
      exec: can_rx_node
      name: can_rx_node
