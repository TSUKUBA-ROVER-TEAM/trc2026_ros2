launch:

  - arg:
        name: "namespace"
        default: ""
        description: "Top-level namespace"

  - arg:
        name: "use_sim_time"
        default: "True"
        description: "Use simulation (Gazebo) clock if true"

  - arg:
        name: "use_namespace"
        default: "false"
        description: "Whether to apply a namespace to the navigation stack"

  - arg:
        name: "slam"
        default: "True"
        description: "Whether run a SLAM"

  - arg:
        name: "autostart"
        default: "true"
        description: "Automatically startup the nav2 stack"

  - arg:
        name: "use_composition"
        default: "True"
        description: "Whether to use composed bringup"

  - arg:
        name: "use_respawn"
        default: "False"
        description: "Whether to respawn if a node crashes. Applied when composition is disabled."

  - arg:
        name: "rviz_config_file"
        default: "$(find-pkg-share trc2026_bringup)/rviz/nav2_view.rviz"
        description: "Full path to the RVIZ config file to use"

  - arg:
        name: "use_rviz"
        default: "True"
        description: "Whether to start rviz"

  - arg:
        name: "use_simulator"
        default: "True"
        description: "Whether to start the simulator"

  - arg:
        name: "use_robot_state_pub"
        default: "True"
        description: "Whether to start the robot state publisher"

  - arg:
        name: "headless"
        default: "False"
        description: "Whether to execute gzclient"

  - arg:
        name: "world"
        default: "$(find-pkg-share trc2026_gazebo)/worlds/empty.sdf"
        description: "Full path to world model file to load"

  - arg:
        name: "robot_name"
        default: "trc2026"
        description: "name of the robot"

  - arg:
        name: "robot_sdf"
        default: "$(find-pkg-share trc2026_description)/urdf/trc2026.xacro"
        description: "Full path to robot sdf file to spawn the robot in gazebo"

  - arg:
        name: "include_arm"
        default: "False"
        description: "Whether to include arm links and joints"

  - include:
        file: "$(find-pkg-share trc2026_gazebo)/launch/spawn.launch.py"
        arg:
          - { name: "namespace", value: "$(var namespace)" }
          - { name: "use_namespace", value: "$(var use_namespace)" }
          - { name: "use_sim_time", value: "$(var use_sim_time)" }
          - { name: "headless", value: "$(var headless)" }
          - { name: "world", value: "$(var world)" }
          - { name: "robot_name", value: "$(var robot_name)" }
          - { name: "robot_sdf", value: "$(var robot_sdf)" }
          - { name: "include_arm", value: "$(var include_arm)" }
          - { name: "use_simulator", value: "$(var use_simulator)" }

  - node:
      pkg: foxglove_bridge
      exec: foxglove_bridge
      name: foxglove_bridge
      output: screen
      remap:
        - from: /joy
          to: /joy_foxglove
      param:
        - name: "asset_uri_allowlist"
          value: ["^package://.*$"]

  - node:
      pkg: "trc2026_control"
      exec: "four_wheel_steer_controller_node"
      name: "four_wheel_steer_controller"
      output: "screen"
      remap:
        - from: "/cmd_vel"
          to: "/cmd_vel_out"
      param:
        - name: "publish_joint_states"
          value: false
        - name: "publish_odom"
          value: true
        - name: "publish_odom_tf"
          value: false
        - name: "gear_ratio_scale"
          value: 0.6981 # (36.0 / 19.1) * (20.0 / 54.0) = 0.6981 (M3508 + 外部減速20:54用)

  # 自己位置推定 (Local EKF)
  - node:
      pkg: "robot_localization"
      exec: "ekf_node"
      name: "ekf_filter_node_odom"
      output: "screen"
      param:
        - from: "$(find-pkg-share trc2026_bringup)/config/localization.yaml"
      remap:
        - from: "/odometry/filtered"
          to: "/odometry/local"

  # 自己位置推定 (Global EKF)
  - node:
      pkg: "robot_localization"
      exec: "ekf_node"
      name: "ekf_filter_node_map"
      output: "screen"
      param:
        - from: "$(find-pkg-share trc2026_bringup)/config/localization.yaml"
      remap:
        - from: "/odometry/filtered"
          to: "/odometry/global"

  # GPS座標変換
  - node:
      pkg: "robot_localization"
      exec: "navsat_transform_node"
      name: "navsat_transform"
      output: "screen"
      param:
        - from: "$(find-pkg-share trc2026_bringup)/config/localization.yaml"
        - name: "datum"
          value: [&gps_origin_lat 36.111090833333336, &gps_origin_lon 140.09949666666665, 0.0] # 実座標はここを変更
      remap:
        - from: "/imu/data"
          to: "/imu/data"
        - from: "/gps/fix"
          to: "/gps/fix"
        - from: "/odometry/filtered"
          to: "/odometry/global"

  # ウェイポイント追従
  - node:
      pkg: "four_wheel_steering_nav2"
      exec: "waypoint_follower"
      name: "waypoint_follower"
      output: "screen"
      param:
        - name: "waypoints_file"
          value: ""
        - name: "use_pure_pursuit"
          value: false # 4WS制御モード
        - name: "gps_origin_lat"
          value: *gps_origin_lat
        - name: "gps_origin_lon"
          value: *gps_origin_lon
      remap:
        - from: "/odometry/filtered"
          to: "/odometry/global"
        - from: "/cmd_vel"
          to: "/cmd_vel_nav"

  # ArUcoミッションマネージャー
  - node:
      pkg: "four_wheel_steering_nav2"
      exec: "aruco_mission_manager"
      name: "aruco_mission_manager"
      output: "screen"
      param:
        - name: "csv_path"
          value: "$(find-pkg-share trc2026_bringup)/config/aruco_missions.csv"
        - name: "gps_origin_lat"
          value: *gps_origin_lat
        - name: "gps_origin_lon"
          value: *gps_origin_lon
        - name: "pass_margin"
          value: 1.0
        - name: "target_offset"
          value: 2.0
        - name: "frame_id"
          value: "map"
      remap:
        - from: "/odometry/filtered"
          to: "/odometry/global"

  # ナビゲーション可視化 (Foxglove/RViz)
  - node:
      pkg: "four_wheel_steering_nav2"
      exec: "navigation_visualizer"
      name: "navigation_visualizer"
      output: "screen"
      param:
        - name: "waypoints_file"
          value: "$(find-pkg-share four_wheel_steering_nav2)/config/waypoints.yaml"
        - name: "gps_origin_lat"
          value: *gps_origin_lat
        - name: "gps_origin_lon"
          value: *gps_origin_lon
        - name: "frame_id"
          value: "map"
        - name: "path_length"
          value: 1000
      remap:
        - from: "/odometry/filtered"
          to: "/odometry/global"

  # ナビゲーション管理 (サービス/ステータス用)
  - node:
      pkg: "four_wheel_steering_nav2"
      exec: "navigation_master"
      name: "navigation_master"
      output: "screen"
      remap:
        - from: "/odometry/filtered"
          to: "/odometry/global"

  - node:
        if: "$(var use_rviz)"
        pkg: "rviz2"
        exec: "rviz2"
        name: "rviz2"
        output: "screen"
        param:
          - { name: "use_sim_time", value: "$(var use_sim_time)" }
        remap:
          - { from: "/tf", to: "tf" }
          - { from: "/tf_static", to: "tf_static" }
  
  - node:
      pkg: "twist_mux"
      exec: "twist_mux"
      name: "twist_mux"
      output: "screen"
      param:
        - from: "$(find-pkg-share trc2026_bringup)/config/twist_mux.yaml"
      remap:
        - from: "/cmd_vel"
          to: "/cmd_vel_out"

  - node:
      pkg: "trc2026_manual"
      exec: "drive_manual_controller_node"
      output: "screen"
      remap:
        - from: "/cmd_vel"
          to: "/cmd_vel_manual"
      param:
        - name: "scale_linear_x"
          value: 0.6981
        - name: "scale_linear_y"
          value: 0.6981
        - name: "scale_angular_z"
          value: 0.6981

  - node:
        pkg: "joy"
        exec: "joy_node"
        name: "joy_node"
        output: "screen"
